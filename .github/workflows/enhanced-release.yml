name: Enhanced Release Automation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version (e.g., 2.0) - leave empty for auto-increment'
        required: false
        type: string
      version_bump:
        description: 'Version bump type (used if version not specified)'
        required: false
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
      pre_release:
        description: 'Create pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  versioning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      previous_version: ${{ steps.set_version.outputs.previous_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Resolve version
        id: set_version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "Error: invalid version format: $INPUT_VERSION"
              exit 1
            fi
            VERSION="$INPUT_VERSION"
            echo "Using explicit version: $VERSION"
          else
            VERSION=$(grep -oP '<PackageVersion>\K[^<]+' Abblix.Oidc.Server/Abblix.Oidc.Server.csproj || echo "")
            if [ -z "$VERSION" ]; then
              echo "Error: could not extract version from project files"
              exit 1
            fi
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "Error: invalid version format from project file: $VERSION"
              exit 1
            fi
            echo "Using project file version: $VERSION"
          fi

          PREVIOUS_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_VERSION" ]; then
            PREVIOUS_VERSION=${PREVIOUS_VERSION#v}
            echo "Previous version: $PREVIOUS_VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: versioning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.versioning.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release -p:AssemblyVersion="$VERSION.0" -p:PackageVersion="$VERSION"
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
      - name: Pack
        run: dotnet pack --no-build -c Release -o nupkg -p:AssemblyVersion="$VERSION.0" -p:PackageVersion="$VERSION"
      - name: Upload NuGet packages as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-packages
          path: |
            nupkg/*.nupkg
            nupkg/*.snupkg

  test-getting-started:
    needs: [versioning, build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.versioning.outputs.version }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: main-repo
      - name: Checkout GettingStarted repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Abblix/Oidc.Server.GettingStarted
          path: getting-started
      - name: Download NuGet packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: local-packages
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0'
      - name: Setup local package source
        run: |
          dotnet nuget add source "$(pwd)/local-packages" --name "LocalAbblix"
          dotnet nuget locals all --clear
      - name: Update package references
        run: |
          cd getting-started
          sed -i "s|<PackageReference Include=\"Abblix.Oidc.Server.Mvc\" Version=\"[^\"]*\"|<PackageReference Include=\"Abblix.Oidc.Server.Mvc\" Version=\"$VERSION\"|g" OpenIDProviderApp/OpenIDProviderApp.csproj
      - name: Test GettingStarted builds
        run: |
          cd getting-started
          dotnet restore
          dotnet build
      - name: Test OpenIDProviderApp runs
        run: |
          cd getting-started/OpenIDProviderApp
          dotnet run &
          APP_PID=$!
          for _ in {1..30}; do
            if curl -fsS http://localhost:5000 >/dev/null 2>&1 \
               || curl -fsS http://localhost:5000/.well-known/openid-configuration >/dev/null 2>&1; then
              echo "App is responding"
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "App process died before responding"
              exit 1
            fi
            sleep 1
          done
          kill "$APP_PID" 2>/dev/null || true

  create-release:
    needs: [versioning, build-and-test, test-getting-started]
    runs-on: ubuntu-latest
    environment: release-approval
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.versioning.outputs.version }}
      PREVIOUS_VERSION: ${{ needs.versioning.outputs.previous_version }}
    outputs:
      is_prerelease: ${{ steps.validate_inputs.outputs.is_prerelease }}
    steps:
      - name: Validate and normalize inputs
        id: validate_inputs
        env:
          INPUT_PRE_RELEASE: ${{ github.event.inputs.pre_release }}
        run: |
          if [ "$INPUT_PRE_RELEASE" = "true" ]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Download NuGet packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: nupkg
      - name: Create or verify tag
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists - using existing tag"
          else
            echo "Creating new tag v$VERSION"
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
          fi
      - name: Generate changelog
        id: changelog
        run: |
          if git tag -v "v$VERSION" >/dev/null 2>&1; then
            echo "Using signed tag message as release notes"
            git tag -l --format='%(contents)' "v$VERSION" > CHANGELOG.md
          elif [ -n "$PREVIOUS_VERSION" ]; then
            echo "## Changes since v$PREVIOUS_VERSION" > CHANGELOG.md
            echo "" >> CHANGELOG.md

            PREV_TAG="v$PREVIOUS_VERSION"
            CURR_TAG="v$VERSION"

            if git rev-parse "$PREV_TAG" >/dev/null 2>&1 && git rev-parse "$CURR_TAG" >/dev/null 2>&1; then
              git log --oneline "$PREV_TAG..$CURR_TAG" --pretty=format:"- %s" >> CHANGELOG.md \
                || echo "- Various improvements and fixes" >> CHANGELOG.md
            else
              echo "- Various improvements and fixes" >> CHANGELOG.md
            fi
          else
            echo "## Initial Release" > CHANGELOG.md
          fi

          {
            echo ""
            echo "## NuGet Packages"
            for pkg in nupkg/*.nupkg; do
              basename=$(basename "$pkg" .nupkg)
              echo "- $basename"
            done

            echo ""
            echo "Available on:"
            echo "- [NuGet.org](https://www.nuget.org/packages?q=Abblix)"
            echo "- [GitHub Packages](https://github.com/Abblix/Oidc.Server/packages)"
          } >> CHANGELOG.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.versioning.outputs.version }}
          name: v${{ needs.versioning.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            nupkg/*.nupkg
            nupkg/*.snupkg
          prerelease: ${{ steps.validate_inputs.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.validate_inputs.outputs.is_prerelease != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-github-packages:
    needs: [versioning, build-and-test, test-getting-started, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: nupkg
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0'
      - name: List packages to be published
        run: |
          echo "Packages ready for publishing to GitHub Packages:"
          for pkg in nupkg/*.nupkg; do
            echo "  - $(basename "$pkg")"
          done
          echo "Publishing destination: https://nuget.pkg.github.com/Abblix/index.json"
      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in nupkg/*.nupkg; do
            echo "Publishing $(basename "$pkg") to GitHub Packages..."
            dotnet nuget push "$pkg" \
              --api-key "$GITHUB_TOKEN" \
              --source https://nuget.pkg.github.com/Abblix/index.json \
              --skip-duplicate
          done
          echo "GitHub Packages publishing completed"
      - name: Verify publication
        run: |
          echo "Verification: https://github.com/Abblix/Oidc.Server/packages"
          echo "Published packages:"
          for pkg in nupkg/*.nupkg; do
            PACKAGE_NAME=$(basename "$pkg" .nupkg)
            echo "  - $PACKAGE_NAME"
          done

  publish-nuget-org:
    needs: [versioning, build-and-test, test-getting-started, create-release]
    runs-on: ubuntu-latest
    environment: publish-packages
    permissions:
      contents: read
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: nupkg
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0'
      - name: List packages to be published
        run: |
          echo "Packages ready for publishing to NuGet.org:"
          for pkg in nupkg/*.nupkg; do
            echo "  - $(basename "$pkg")"
          done
          echo "Publishing destination: https://api.nuget.org/v3/index.json"
          echo "This step requires manual approval in GitHub Actions."
      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for pkg in nupkg/*.nupkg; do
            echo "Publishing $(basename "$pkg") to NuGet.org..."
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
          echo "NuGet.org publishing completed"
      - name: Verify publication
        run: |
          echo "Verification: https://www.nuget.org/packages?q=Abblix"
          echo "Wait 5-15 minutes for package indexing to complete"
          echo "Published packages:"
          for pkg in nupkg/*.nupkg; do
            PACKAGE_NAME=$(basename "$pkg" .nupkg)
            echo "  - $PACKAGE_NAME"
          done

  update-getting-started:
    needs: [versioning, create-release, publish-nuget-org]
    runs-on: ubuntu-latest
    environment: update-sample
    permissions:
      contents: read
    if: ${{ needs.create-release.outputs.is_prerelease == 'false' }}
    env:
      VERSION: ${{ needs.versioning.outputs.version }}
    steps:
      - name: Checkout GettingStarted repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Abblix/Oidc.Server.GettingStarted
          token: ${{ secrets.GETTING_STARTED_REPO_TOKEN }}
      - name: Update package references to released version
        run: |
          sed -i "s|<PackageReference Include=\"Abblix.Oidc.Server.Mvc\" Version=\"[^\"]*\"|<PackageReference Include=\"Abblix.Oidc.Server.Mvc\" Version=\"$VERSION\"|g" OpenIDProviderApp/OpenIDProviderApp.csproj
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update Abblix packages to v$VERSION" || exit 0
          git push
