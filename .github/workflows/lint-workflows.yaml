name: Lint workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/lint-no-inline-secrets.py'
  push:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-workflows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-inline-secrets:
    name: Block inline untrusted-input interpolation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.5.0
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install --disable-pip-version-check pyyaml

      - name: "Block inline untrusted-input interpolation in run: blocks"
        run: python .github/scripts/lint-no-inline-secrets.py

  actionlint:
    name: actionlint (schema + shellcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ACTIONLINT_VERSION: '1.7.10'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint

      - name: Run actionlint
        run: ./actionlint -color
