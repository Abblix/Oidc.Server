version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      prefix-development: "ci"
      include: "scope"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      microsoft-identity-model:
        patterns:
          - "Microsoft.IdentityModel.*"
          - "System.IdentityModel.*"
      grpc:
        patterns:
          - "Grpc.*"
          - "Google.Protobuf*"
      test-infrastructure:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "Moq"
          - "coverlet.*"
    ignore:
      - dependency-name: "Microsoft.AspNetCore.Http.Abstractions"
        # 2.3.9 is the last standalone release; 3.x moved into the ASP.NET Core
        # shared framework. No upgrades exist for netstandard2.0 consumers.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "ci"
      include: "scope"
